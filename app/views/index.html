<!DOCTYPE html>
<html>
  <head>

    <title>Tom Hardman</title>
    <script src="https://code.jquery.com/jquery-1.11.1.min.js" type="text/javascript"></script>
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:300' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" type="text/css" href="/assets/styl/output.css">

    <!-- Custom scripts -->
    <script>
    $(document).ready(function(){
      //Mail to with no spam
      $(".email").click(function(){
        var mailto = "mailto:",
            name = "hello",
            at = "@",
            domain = "tomhardman",
            tld = ".xyz",
            self = "_self";

        window.open(mailto + name + at + domain + tld, self);
      })

      $(".emailTwo").click(function(){
        var mailto = "mailto:",
            name = "info",
            at = "@",
            domain = "greaterthan",
            tld = ".xyz",
            self = "_self";

        window.open(mailto + name + at + domain + tld, self);
      })


      var center = function(){
          var text = $(".text");
          var textPad = $(".textPad");
          var windowInner = $(window).innerHeight();

          if ( text.outerHeight() >= windowInner ) {
            text.removeClass("text").addClass("textPad");
          } else {
            textPad.removeClass("textPad").addClass("text");
          }
        }
        center();
        $(window).resize(function(){
          center();
        })
    })
    </script>

  </head>
